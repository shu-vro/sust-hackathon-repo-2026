# Runtime environment is supplied at compose time — not baked into the image.
#
#   docker compose --env-file .env up --build
#   docker compose --env-file .env up -d
#   docker compose down
#
# Expected variables in .env (see src/config/env.ts):
#   PORT=3001
#   HOST=0.0.0.0
#   OPENROUTER_API_KEY=...
#   ENABLE_LLM_GUARDRAIL=true
#   APP_VERSION=0.1.0

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.bun
    image: sust-hackathon:latest
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      NODE_ENV: production
      BUN_ENV: production
      PORT: ${PORT:-3001}
      HOST: ${HOST:-0.0.0.0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ENABLE_LLM_GUARDRAIL: ${ENABLE_LLM_GUARDRAIL:-true}
      APP_VERSION: ${APP_VERSION:-0.1.0}
    restart: unless-stopped
